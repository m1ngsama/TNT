name: Bug Report
description: Report a reproducible problem in TNT.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security vulnerabilities, do not open a public issue. See SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `tnt --version`, or provide the commit hash.
      placeholder: "tnt 1.1.0"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation Method
      options:
        - GitHub release binary
        - Source build
        - install.sh
        - Package manager draft
        - Other
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "Ubuntu 24.04 x86_64, Arch Linux, macOS 15 arm64"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Keep this as small and concrete as possible.
      placeholder: |
        1. Start TNT with ...
        2. Connect with ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Remove secrets, access tokens, and private hostnames.
      render: text
