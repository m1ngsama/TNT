name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y expect libssh-dev

    - name: Build
      run: make

    - name: Build with AddressSanitizer
      run: make asan

    - name: Run tests
      run: |
        make test
        cd tests
        ./test_security_features.sh
